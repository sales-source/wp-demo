
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WordPress 체험판 · 테라클래스</title>
  <link rel="icon" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #fff;
      color: #191F28;
      overflow: hidden;
      height: 100vh;
    }

    /* ── 로딩 화면 ── */
    #loading {
      position: fixed;
      inset: 0;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.6s ease;
    }

    #loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .logo {
      width: 160px;
      height: 48px;
      object-fit: contain;
      margin-bottom: 28px;
    }

    .loading-title {
      font-size: 19px;
      font-weight: 700;
      color: #191F28;
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }

    .loading-sub {
      font-size: 14px;
      color: #8B95A1;
      font-weight: 400;
      margin-bottom: 36px;
    }

    .bar-wrap {
      width: 180px;
      height: 3px;
      background: #F2F4F6;
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      background: #0064FF;
      border-radius: 99px;
      animation: grow 70s cubic-bezier(0.1, 0.4, 0.6, 1) forwards;
    }

    @keyframes grow {
      0%   { width: 0%; }
      60%  { width: 85%; }
      100% { width: 95%; }
    }

    .dots {
      display: flex;
      gap: 5px;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #0064FF;
      animation: pulse 1.2s infinite ease-in-out;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.3); }
    }

    /* ── 타이머 ── */
    #timer {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 500;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 9px 14px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.09);
      display: none;
      align-items: center;
      gap: 8px;
    }

    .timer-icon {
      width: 15px;
      height: 15px;
      color: #0064FF;
      flex-shrink: 0;
    }

    .timer-inner { display: flex; flex-direction: column; }

    .timer-label {
      font-size: 10px;
      color: #8B95A1;
      font-weight: 500;
      margin-bottom: 1px;
    }

    .timer-value {
      font-size: 14px;
      font-weight: 700;
      color: #191F28;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.5px;
    }

    #timer.warn .timer-value { color: #FF6B00; }
    #timer.warn .timer-icon  { color: #FF6B00; }

    /* ── iframe ── */
    .frame-box {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow: hidden;
    }

    #frame {
      position: absolute;
      top: -40px;           /* Playground 상단 바 숨김 */
      left: 0;
      width: 100%;
      height: calc(100% + 40px);
      border: none;
    }

    /* ── 만료 화면 ── */
    #expiry {
      position: fixed;
      inset: 0;
      background: rgba(25, 31, 40, 0.65);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .expiry-card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 40px;
      text-align: center;
      max-width: 380px;
      width: 90%;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.14);
    }

    .expiry-badge {
      width: 60px;
      height: 60px;
      background: #F2F4F6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .expiry-badge img {
      width: 32px;
      height: 32px;
    }

    .expiry-title {
      font-size: 20px;
      font-weight: 700;
      color: #191F28;
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .expiry-desc {
      font-size: 14px;
      color: #6B7684;
      line-height: 1.7;
      margin-bottom: 28px;
    }

    .expiry-btn {
      display: inline-block;
      background: #0064FF;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      padding: 15px 32px;
      border-radius: 12px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.15s;
      font-family: inherit;
      letter-spacing: -0.2px;
    }

    .expiry-btn:hover { background: #0055D4; }
  </style>
</head>
<body>

  <!-- 로딩 화면 -->
  <div id="loading">
    <img class="logo" src="logo.png" alt="테라클래스">
    <div class="loading-title">WordPress 체험판 준비 중</div>
    <div class="loading-sub">잠시만 기다려주세요. 약 1분 정도 소요됩니다.</div>
    <div class="bar-wrap"><div class="bar-fill"></div></div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <!-- 타이머 -->
  <div id="timer">
    <svg class="timer-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <polyline points="12 6 12 12 16 14"/>
    </svg>
    <div class="timer-inner">
      <span class="timer-label">남은 체험 시간</span>
      <span class="timer-value" id="timer-val">02:00:00</span>
    </div>
  </div>

  <!-- Playground -->
  <div class="frame-box">
    <iframe
      id="frame"
      src="https://playground.wordpress.net/?blueprint-url=https://cdn.jsdelivr.net/gh/sales-source/wp-demo@main/blueprint.json"
      allow="cross-origin-isolated"
    ></iframe>
  </div>

  <!-- 만료 화면 -->
  <div id="expiry">
    <div class="expiry-card">
      <div class="expiry-badge">
        <img src="logo.png" alt="테라클래스">
      </div>
      <div class="expiry-title">체험 시간이 종료되었습니다</div>
      <div class="expiry-desc">
        2시간의 무료 체험이 끝났습니다.<br>
        나만의 WordPress 사이트를 시작해보세요.
      </div>
      <a id="purchase-btn" href="https://youtube.com" target="_blank" class="expiry-btn">
        호스팅 구매하기
      </a>
    </div>
  </div>

  <script>
    const DURATION    = 2 * 60 * 60 * 1000; // 2시간
    const WARN_AT     = 15 * 60 * 1000;     // 15분 남으면 경고색
    const STORAGE_KEY = 'tc_wp_trial_start';

    const loading  = document.getElementById('loading');
    const timer    = document.getElementById('timer');
    const timerVal = document.getElementById('timer-val');
    const expiry   = document.getElementById('expiry');
    const frame    = document.getElementById('frame');

    // 로딩 완료 감지
    // Elementor 설치에 약 70초 소요 → 최소 75초 유지 후 iframe load 확인
    const MIN_LOADING_MS = 75000;
    const loadStart = Date.now();
    let iframeLoaded = false;

    frame.addEventListener('load', () => {
      iframeLoaded = true;
      const elapsed = Date.now() - loadStart;
      const wait = Math.max(0, MIN_LOADING_MS - elapsed);
      setTimeout(hideLoading, wait);
    });

    // 안전망: 90초 후에도 안 사라지면 강제로 숨김
    setTimeout(() => { if (!iframeLoaded) hideLoading(); }, 90000);

    function hideLoading() {
      loading.classList.add('fade-out');
      setTimeout(() => {
        loading.style.display = 'none';
        timer.style.display = 'flex';
        startTimer();
      }, 600);
    }

    // 타이머 (LocalStorage로 새로고침해도 유지)
    function startTimer() {
      if (!localStorage.getItem(STORAGE_KEY)) {
        localStorage.setItem(STORAGE_KEY, Date.now().toString());
      }

      const start = parseInt(localStorage.getItem(STORAGE_KEY));

      function tick() {
        const left = DURATION - (Date.now() - start);

        if (left <= 0) {
          timerVal.textContent = '00:00:00';
          expiry.style.display = 'flex';
          return;
        }

        const h = Math.floor(left / 3600000);
        const m = Math.floor((left % 3600000) / 60000);
        const s = Math.floor((left % 60000) / 1000);

        timerVal.textContent =
          String(h).padStart(2,'0') + ':' +
          String(m).padStart(2,'0') + ':' +
          String(s).padStart(2,'0');

        timer.classList.toggle('warn', left < WARN_AT);

        setTimeout(tick, 1000);
      }

      tick();
    }
  </script>
</body>
</html>
